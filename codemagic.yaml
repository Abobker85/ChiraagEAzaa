workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze Dart code
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Clean iOS CocoaPods artifacts
        script: |
          rm -rf ios/Pods ios/Podfile.lock
          if [ -d ios/Runner.xcworkspace ]; then
            (cd ios && pod deintegrate) || true
          fi
      - name: Build iOS simulator app
        script: flutter build ios --simulator --debug --no-codesign
      - name: Package simulator app
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - build/ios/iphonesimulator/Runner.app.zip