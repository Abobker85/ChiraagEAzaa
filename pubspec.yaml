name: chiraag_e_azaa
description: 5,128 Nouhay, Marsias, Duas, Manqabat & more
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SQLite database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Audio playback
  just_audio: ^0.9.36

  # Push notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: 19.4.0

  # HTML rendering for lyrics
  flutter_html: ^3.0.0-beta.2

  # Persistent settings
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true
  assets:
    - assets/chiraag_e_azaa.db
